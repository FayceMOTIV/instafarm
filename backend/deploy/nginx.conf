# Nginx reverse proxy pour InstaFarm
# Domaine : instafarm.facemedia.tech

upstream instafarm_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name instafarm.facemedia.tech;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name instafarm.facemedia.tech;

    # SSL — sera configure par certbot
    ssl_certificate /etc/letsencrypt/live/instafarm.facemedia.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/instafarm.facemedia.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # PWA static files
    location /pwa/ {
        alias /opt/instafarm/pwa/;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Service Worker — pas de cache
    location = /sw.js {
        alias /opt/instafarm/pwa/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Manifest
    location = /manifest.json {
        alias /opt/instafarm/pwa/manifest.json;
        add_header Cache-Control "public, max-age=86400";
    }

    # PWA root
    location = / {
        alias /opt/instafarm/pwa/;
        try_files /index.html =404;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://instafarm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # Health check (pas de rate limit)
    location = /health {
        proxy_pass http://instafarm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Admin endpoint
    location /admin {
        proxy_pass http://instafarm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Block common attack paths
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
}

# Rate limiting zone (dans http context — ajouter dans /etc/nginx/nginx.conf)
